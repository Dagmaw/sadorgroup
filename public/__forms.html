<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sador Group Forms Detection Skeleton</title>
</head>
<body>
  <!-- This file is only read by Netlify's build system for form detection -->
  <form name="quote_request" data-netlify="true" netlify-honeypot="bot-field" hidden>
    <input type="hidden" name="form-name" value="quote_request" />
    <input type="text" name="name" />
    <input type="email" name="email" />
    <input type="text" name="company" />
    <input type="text" name="product_interest" />
    <textarea name="message"></textarea>
    <input name="bot-field" />
  </form>
</body>
</html>
